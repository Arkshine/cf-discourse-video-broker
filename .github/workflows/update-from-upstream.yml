name: Update from upstream

# Pulls the latest broker code from the original project into your copy and
# pushes it, which makes Cloudflare rebuild and redeploy automatically.
#
# How to run: open the **Actions** tab → **Update from upstream** → **Run workflow**.
#

on:
  workflow_dispatch:
  # Prefer hands-off updates? Uncomment to also run weekly (Mondays 04:00 UTC).
  # Note: this deploys new upstream versions without you reviewing them first.
  # schedule:
  #   - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Arkshine/cf-discourse-video-broker.git
          git fetch upstream
          git checkout upstream/main -- . ':!wrangler.jsonc' ':!.github/workflows'
          git add -A
          git commit -m "Update from upstream" || { echo "Already up to date."; exit 0; }
          git push origin HEAD
